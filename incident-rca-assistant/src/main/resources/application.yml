spring:
  application:
    name: incident-rca-assistant

  datasource:
    url: jdbc:postgresql://localhost:5432/rca_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: rca-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "com.rca.model"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

openai:
  api-key: ${OPENAI_API_KEY}
  base-url: https://api.openai.com/v1
  embedding-model: text-embedding-3-small
  chat-model: gpt-4-turbo-preview
  max-tokens: 2000

slack:
  bot-token: ${SLACK_BOT_TOKEN}
  channel: ${SLACK_ALERT_CHANNEL:#incidents}

rca:
  kafka:
    alert-topic: alerts.raw
    rca-topic: rca.generated
  rag:
    top-k: 5
    similarity-threshold: 0.75
  embedding:
    dimensions: 1536

server:
  port: 8080

logging:
  level:
    com.rca: DEBUG
    org.springframework.kafka: INFO
